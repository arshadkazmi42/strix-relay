<!doctype html>
<meta charset="utf-8">
<title>Strix Relay</title>
<style>
  body{font-family:system-ui,sans-serif;width:300px;margin:0;padding:12px;font-size:13px}
  h1{font-size:14px;margin:0 0 8px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
  .k{color:#666;font-size:12px}
  .ok{color:#080;font-weight:600}
  .bad{color:#c00;font-weight:600}
  pre{background:#f5f5f5;padding:6px;margin:4px 0;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-radius:3px}
  button{width:100%;padding:6px;margin-top:6px;cursor:pointer;font-size:12px}
  .small{font-size:11px;color:#888;margin-top:8px}
</style>
<h1>Strix Relay</h1>
<div class="row"><span class="k">WebSocket</span><span id="ws" class="bad">checking…</span></div>
<div class="row"><span class="k">DevTools</span><span id="dt" class="k">—</span></div>
<div class="k">Relay URL</div>
<pre id="url">—</pre>
<div class="row"><span class="k">Pinned tab</span><span id="pin">—</span></div>
<button id="pinBtn">Pin current tab</button>
<button id="unpinBtn">Unpin</button>
<button id="optBtn">Options…</button>
<div class="small">Status refreshes on open. Reconnect is automatic (1s→30s backoff).</div>
<script src="popup.js"></script>

<!doctype html>
<meta charset="utf-8">
<title>Strix Relay Options</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:560px;margin:2em auto;padding:0 1em}
  label{display:block;margin-top:1em;font-weight:600}
  textarea{width:100%;font-family:ui-monospace,monospace;font-size:13px;padding:8px;box-sizing:border-box}
  button{padding:8px 16px;margin-top:1em;cursor:pointer}
  #status{margin-left:1em;color:#080}
  .hint{color:#666;font-size:12px;margin-top:4px}
</style>
<h1>Strix Relay</h1>
<label for="url">Relay URL</label>
<textarea id="url" rows="1">ws://localhost:9876/ws</textarea>
<div class="hint">The local WebSocket the extension dials. Usually leave as-is.</div>
<label for="tok">Token</label>
<textarea id="tok" rows="1" placeholder="32 hex chars from .token"></textarea>
<div class="hint">Paste contents of ./.token (printed by ./start.sh).</div>
<p><button id="save">Save &amp; Reload</button><span id="status"></span></p>
<script src="options.js"></script>
